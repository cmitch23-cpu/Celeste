<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celeste</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0b09; --s1: #111210; --s2: #181916; --s3: #1f211d;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.11);
  --text: #e4e2db; --text2: #8a887f; --text3: #4a4845;
  --accent: #1D9E75; --accent-l: #5DCAA5; --accent-dim: rgba(29,158,117,0.12); --accent-b: rgba(29,158,117,0.25);
  --warn: #BA7517; --warn-dim: rgba(186,117,23,0.12); --warn-b: rgba(186,117,23,0.3);
  --red: #c44; --red-dim: rgba(200,68,68,0.12);
  --font: 'DM Sans', sans-serif; --display: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
}
html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* GATE */
.gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
.gate-box { width: 100%; max-width: 400px; padding: 0 20px; animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.gate-logo { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-dim); border: 1px solid var(--accent-b); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 20px; }
.gate-box h1 { font-family: var(--display); font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 6px; }
.gate-box p { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.6; margin-bottom: 22px; }
.gate-box p a { color: var(--accent-l); text-decoration: none; }
.flabel { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 5px; letter-spacing: 0.04em; }
.finp { width: 100%; background: var(--s2); border: 1px solid var(--border2); border-radius: 8px; padding: 11px 14px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; margin-bottom: 10px; transition: border-color 0.15s; }
.finp:focus { border-color: var(--accent); }
.finp::placeholder { color: var(--text3); }
.gbtn { width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; display: block; margin-bottom: 8px; }
.gbtn:hover { opacity: 0.88; }
.sbtn { width: 100%; padding: 10px 14px; background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: 8px; font-family: var(--font); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.15s; margin-bottom: 8px; }
.sbtn:hover { background: var(--s2); }
.sbtn svg { width: 16px; height: 16px; flex-shrink: 0; }
.skip-btn { width: 100%; padding: 10px; background: transparent; color: var(--text3); border: 1px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 13px; cursor: pointer; margin-bottom: 8px; }
.skip-btn:hover { color: var(--text2); }
.status-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 18px; }
.sbadge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-family: var(--mono); display: flex; align-items: center; gap: 4px; border: 1px solid var(--border2); background: var(--s2); color: var(--text3); }
.sbadge.on { background: var(--accent-dim); color: var(--accent-l); border-color: var(--accent-b); }
.sbadge-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }
.div-row { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
.div-line { flex: 1; height: 1px; background: var(--border); }
.div-row span { font-size: 11px; color: var(--text3); }

/* DASHBOARD */
#dashboard { display: none; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }

/* TOPBAR */
#topbar { display: flex; align-items: center; justify-content: space-between; padding: 9px 16px; background: var(--s1); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; }
.tb-left { display: flex; align-items: center; gap: 10px; }
.tb-logo { font-family: var(--display); font-size: 15px; font-weight: 600; color: var(--text); }
.tb-date { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.tb-right { display: flex; align-items: center; gap: 8px; }
.mode-toggle { display: flex; background: var(--s2); border: 1px solid var(--border2); border-radius: 20px; padding: 2px; gap: 2px; }
.mode-btn { font-size: 11px; padding: 3px 12px; border-radius: 18px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-family: var(--mono); transition: all 0.15s; }
.mode-btn.active-p { background: var(--accent-dim); color: var(--accent-l); }
.mode-btn.active-w { background: var(--warn-dim); color: var(--warn); }
.cal-filter { display: flex; gap: 3px; }
.cf-btn { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; font-family: var(--mono); transition: all 0.15s; }
.cf-btn.active { background: var(--accent-dim); color: var(--accent-l); border-color: var(--accent-b); }
.lbtn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--font); text-decoration: underline; }
.lbtn:hover { color: var(--text2); }

/* CALENDAR */
#cal-section { flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--s1); }
#cal-grid { display: grid; }
.cal-col { border-right: 1px solid var(--border); padding: 7px 10px; min-width: 0; overflow: hidden; }
.cal-col:last-child { border-right: none; }
.cal-day-header { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.cal-day-num { font-family: var(--display); font-size: 20px; font-weight: 600; color: var(--text3); margin-bottom: 5px; line-height: 1; display: inline-block; }
.cal-col.today .cal-day-num { color: var(--accent-l); background: var(--accent-dim); border-radius: 6px; padding: 1px 7px; margin-left: -7px; }
.cal-col.today .cal-day-header { color: var(--accent-l); }
.cal-event { font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-bottom: 2px; border-left: 2px solid var(--accent); background: var(--accent-dim); color: var(--accent-l); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-event.soon { border-left-color: var(--warn); background: var(--warn-dim); color: #d4951a; animation: pulse-warn 2s infinite; }
@keyframes pulse-warn { 0%,100%{opacity:1} 50%{opacity:0.6} }
.cal-empty { font-size: 10px; color: var(--text3); font-style: italic; }

/* EMAIL BANNER */
#email-section { flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--s2); }
#email-header { display: flex; align-items: center; gap: 8px; padding: 6px 14px 4px; }
.email-title { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
.email-refresh { font-size: 10px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--mono); text-decoration: underline; padding: 0; }
#email-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 0 14px 8px; scrollbar-width: none; }
#email-scroll::-webkit-scrollbar { display: none; }
.email-card { flex-shrink: 0; width: 240px; background: var(--s1); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; cursor: pointer; transition: border-color 0.15s; }
.email-card:hover { border-color: var(--border2); }
.email-card.vip { border-left: 2px solid var(--warn); }
.email-card.program { border-left: 2px solid var(--accent); }
.email-from { font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-subj { font-size: 11px; color: var(--text2); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-preview { font-size: 10px; color: var(--text3); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.email-tag { font-size: 9px; padding: 1px 6px; border-radius: 10px; display: inline-block; margin-top: 3px; font-family: var(--mono); }
.email-tag.vip { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn-b); }
.email-tag.program { background: var(--accent-dim); color: var(--accent-l); border: 1px solid var(--accent-b); }
.email-tag.person { background: var(--s3); color: var(--text2); border: 1px solid var(--border2); }
.email-loading { font-size: 12px; color: var(--text3); padding: 4px 0; align-self: center; }

/* BOTTOM */
#bottom { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* TASKS */
#todo-section { width: 420px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--s1); }
#todo-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.section-title { font-family: var(--display); font-size: 13px; font-weight: 600; color: var(--text); }
.todo-counts { font-size: 11px; color: var(--text3); font-family: var(--mono); }
#quick-add { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#quick-inp { flex: 1; background: var(--s2); border: 1px solid var(--border2); border-radius: 6px; padding: 6px 10px; font-family: var(--font); font-size: 12px; color: var(--text); outline: none; transition: border-color 0.15s; }
#quick-inp:focus { border-color: var(--accent); }
#quick-inp::placeholder { color: var(--text3); }
#quick-add-btn { padding: 6px 10px; background: var(--accent-dim); border: 1px solid var(--accent-b); border-radius: 6px; color: var(--accent-l); font-size: 12px; cursor: pointer; font-family: var(--font); white-space: nowrap; transition: all 0.15s; }
#quick-add-btn:hover { background: var(--accent); color: #fff; }
#todo-filter { display: flex; gap: 4px; padding: 7px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tf-btn { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; font-family: var(--mono); transition: all 0.15s; }
.tf-btn.active { background: var(--accent-dim); color: var(--accent-l); border-color: var(--accent-b); }
#todo-list { flex: 1; overflow-y: auto; padding: 8px 10px; }
#todo-list::-webkit-scrollbar { width: 3px; }
#todo-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.workspace-label { font-size: 10px; color: var(--text3); font-family: var(--mono); padding: 4px 4px 8px; letter-spacing: 0.04em; }
.project-group { margin-bottom: 12px; }
.project-label { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; padding: 0 4px; }
.task-item { border-radius: 7px; margin-bottom: 3px; border: 1px solid transparent; transition: all 0.15s; }
.task-item:hover { background: var(--s2); border-color: var(--border); }
.task-item.done { opacity: 0.38; }
.task-main { display: flex; align-items: flex-start; gap: 8px; padding: 7px 8px 4px; }
.task-cb { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--border2); flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.task-cb:hover { border-color: var(--accent); }
.task-cb.checked { background: var(--accent); border-color: var(--accent); }
.task-cb.checked::after { content:''; width:5px; height:3px; border-left:1.5px solid #fff; border-bottom:1.5px solid #fff; transform:rotate(-45deg) translateY(-1px); display:block; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 13px; color: var(--text); line-height: 1.4; }
.task-item.done .task-text { text-decoration: line-through; color: var(--text3); }
.task-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; flex-wrap: wrap; }
.priority-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.p-high { background: var(--red); } .p-med { background: var(--warn); } .p-low { background: var(--text3); }
.task-proj-tag { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.task-note-toggle { font-size: 10px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--mono); padding: 0; transition: color 0.15s; }
.task-note-toggle:hover { color: var(--text2); }
.task-note-area { padding: 0 8px 6px 30px; }
.task-note { width: 100%; background: transparent; border: none; border-top: 1px solid var(--border); padding: 4px 0; font-family: var(--font); font-size: 11px; color: var(--text2); outline: none; resize: none; line-height: 1.5; display: none; }
.task-note::placeholder { color: var(--text3); }
.task-note.visible { display: block; }
.todo-empty { font-size: 13px; color: var(--text3); text-align: center; padding: 28px 16px; line-height: 1.7; }

/* CHAT */
#chat-section { flex: 1; display: flex; flex-direction: column; background: var(--bg); min-width: 0; }
#chat-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; background: var(--s1); }
.chat-av { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-dim); border: 1px solid var(--accent-b); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--accent-l); font-weight: 500; }
.chat-status { font-size: 12px; color: var(--text2); flex: 1; }
#notif-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: none; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
#messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.msg-row { display: flex; gap: 7px; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; align-self: flex-end; max-width: 84%; }
.msg-row.ai, .msg-row.alert { max-width: 90%; }
.msg-av { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
.msg-av.ai { background: var(--accent-dim); color: var(--accent-l); border: 1px solid var(--accent-b); }
.msg-av.user { background: var(--s3); color: var(--text2); border: 1px solid var(--border2); }
.msg-av.alert-meet { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn-b); }
.msg-av.alert-email { background: var(--accent-dim); color: var(--accent-l); border: 1px solid var(--accent-b); }
.msg-bub { padding: 8px 11px; border-radius: 13px; font-size: 13px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.msg-row.ai .msg-bub { background: var(--s2); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 3px; }
.msg-row.user .msg-bub { background: var(--accent); color: #fff; border-top-right-radius: 3px; }
.msg-row.alert .msg-bub { background: var(--warn-dim); border: 1px solid var(--warn-b); color: var(--text); border-top-left-radius: 3px; }
.msg-row.alert.email-alert .msg-bub { background: var(--accent-dim); border-color: var(--accent-b); }
.msg-ts { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 2px; padding: 0 3px; }
.msg-row.user .msg-ts { text-align: right; }
.alert-action { display: inline-block; margin-top: 6px; font-size: 11px; color: var(--accent-l); cursor: pointer; text-decoration: underline; font-family: var(--mono); }
.typing-bub { padding: 9px 13px; display: flex; gap: 4px; align-items: center; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); animation: pulse 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.3)}}
#composer { padding: 9px 11px; border-top: 1px solid var(--border); display: flex; gap: 7px; align-items: flex-end; background: var(--s1); flex-shrink: 0; }
#msg-inp { flex: 1; resize: none; background: var(--s2); border: 1px solid var(--border2); border-radius: 10px; padding: 8px 11px; font-family: var(--font); font-size: 13px; color: var(--text); outline: none; max-height: 200px; overflow-y: auto; line-height: 1.5; transition: border-color 0.15s; }
#msg-inp:focus { border-color: var(--accent); }
#msg-inp::placeholder { color: var(--text3); }
#send-btn { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
#send-btn:hover { opacity: 0.85; }
#send-btn svg { width: 12px; height: 12px; fill: white; }
</style>
</head>
<body>

<div class="gate" id="gate-key">
  <div class="gate-box">
    <div class="gate-logo">✦</div>
    <h1>Celeste</h1>
    <p>Enter your Anthropic API key.<br><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
    <div class="flabel">API key</div>
    <input id="key-inp" class="finp" type="password" placeholder="sk-ant-..." autocomplete="off"/>
    <button class="gbtn" id="key-btn">Continue</button>
  </div>
</div>

<div class="gate" id="gate-google" style="display:none;">
  <div class="gate-box">
    <div class="gate-logo">✦</div>
    <h1>Celeste</h1>
    <p>Connect your accounts for Gmail and Calendar.</p>
    <div class="status-row">
      <div class="sbadge" id="badge-p"><div class="sbadge-dot"></div>Personal</div>
      <div class="sbadge" id="badge-w"><div class="sbadge-dot"></div>Work (CZ)</div>
    </div>
    <button class="sbtn" id="btn-p">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Connect personal (cjmitchell292@gmail.com)
    </button>
    <button class="sbtn" id="btn-w">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Connect work (cj@campaignzero.org)
    </button>
    <div class="div-row"><div class="div-line"></div><span>then</span><div class="div-line"></div></div>
    <button class="gbtn" id="launch-btn">Launch</button>
    <button class="skip-btn" id="skip-btn">Skip — use without Google</button>
  </div>
</div>

<div id="dashboard">
  <div id="topbar">
    <div class="tb-left">
      <span class="tb-logo">Celeste</span>
      <span class="tb-date" id="tb-date"></span>
    </div>
    <div class="tb-right">
      <div class="mode-toggle">
        <button class="mode-btn active-p" id="mode-p">Personal</button>
        <button class="mode-btn" id="mode-w">Work</button>
      </div>
      <div class="cal-filter">
        <button class="cf-btn active" data-view="week">Week</button>
        <button class="cf-btn" data-view="day">Day</button>
      </div>
      <button class="lbtn" id="so-btn">sign out</button>
    </div>
  </div>

      var body=document.createElement("div");body.className="task-body";
      var txt=document.createElement("div");txt.className="task-text";txt.textContent=task.text;
      var meta=document.createElement("div");meta.className="task-meta";
      var dot=document.createElement("div");dot.className="priority-dot p-"+(task.priority||"low");
      var tag=document.createElement("span");tag.className="task-proj-tag";tag.textContent=task.priority||"low";
      var ntog=document.createElement("button");ntog.className="task-note-toggle";ntog.textContent=task.note?"note ▾":"+ note";
      meta.appendChild(dot);meta.appendChild(tag);meta.appendChild(ntog);
      body.appendChild(txt);body.appendChild(meta);main.appendChild(cb);main.appendChild(body);item.appendChild(main);
      var narea=document.createElement("div");narea.className="task-note-area";
      var ninp=document.createElement("textarea");ninp.className="task-note"+(task.note?" visible":"");
      ninp.placeholder="Add notes...";ninp.value=task.note||"";ninp.rows=2;
      ninp.addEventListener("input",function(){task.note=ninp.value;saveTasks();});
      narea.appendChild(ninp);item.appendChild(narea);
      ntog.addEventListener("click",function(e){
        e.stopPropagation();var v=ninp.classList.toggle("visible");
        ntog.textContent=v?"note ▴":(task.note?"note ▾":"+ note");if(v)ninp.focus();
      });
      grp.appendChild(item);
    });
    list.appendChild(grp);
  });
}

// ── TASK COMMANDS ──
function executeTaskCommand(cmd) {
  var arr = T();
  var action = cmd.action, target = (cmd.target||"").toLowerCase();
  var response = "";

  if (action === "clear_all") {
    ws[mode].tasks = [];
    response = "Done — your " + (mode==="p"?"personal":"work") + " task list is cleared.";
  } else if (action === "clear_done") {
    ws[mode].tasks = arr.filter(function(t){return !t.done;});
    response = "Cleared all completed tasks.";
  } else if (action === "mark_done") {
    var count = 0;
    arr.forEach(function(t){ if(!t.done && t.text.toLowerCase().includes(target)){t.done=true;count++;} });
    response = count ? "Marked " + count + " task" + (count>1?"s":"") + " as done." : "Couldn't find a matching task.";
  } else if (action === "remove") {
    var before = arr.length;
    ws[mode].tasks = arr.filter(function(t){ return !t.text.toLowerCase().includes(target); });
    var removed = before - ws[mode].tasks.length;
    response = removed ? "Removed " + removed + " task" + (removed>1?"s":"") + "." : "Couldn't find a matching task.";
  } else if (action === "add") {
    T().push({id:Date.now(),text:cmd.target,project:cmd.project||"General",priority:cmd.priority||"med",today:cmd.today||false,done:false,note:"",created:new Date().toISOString()});
    response = "Added to your task list.";
  }

  saveTasks(); renderTasks();
  return response;
}

// ── SEND ──
document.getElementById("send-btn").addEventListener("click",handleSend);
document.getElementById("msg-inp").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();}
});

  this.style.height="auto";this.style.height=Math.min(this.scrollHeight,200)+"px";

async function handleSend(){
  var inp=document.getElementById("msg-inp"),text=inp.value.trim();
  if(!text||isBusy)return;
  isBusy=true;inp.value="";inp.style.height="auto";
  addUserMsg(text);
  H().push({role:"user",content:text});
  showTyping();

  var wantsEmail=/email|gmail|inbox|unread|message/i.test(text);
  var wantsCal=/calendar|schedule|event|today|tomorrow|week|meeting|upcoming/i.test(text);
  var ctx=[],tok=activeToken(),modeLabel=mode==="p"?"Personal":"Work (CZ)";
  if(wantsEmail&&tok)ctx.push(await getGmailText(tok,modeLabel));
  if(wantsCal&&tok)ctx.push(await getCalText(tok,modeLabel));
  var open=T().filter(function(t){return!t.done;});
  if(open.length&&/urgent|priorit|focus|today|should i|what.*do/i.test(text))
    ctx.push("Open "+modeLabel+" tasks:\n"+open.map(function(t){return"  ["+t.priority+"] "+t.text+" ("+t.project+")"+(t.note?" — "+t.note:"");}).join("\n"));

  var messages=H().filter(function(m){return m.role==="user"||m.role==="assistant";}).map(function(m){return{role:m.role,content:m.content};});
  if(ctx.length)messages[messages.length-1]={role:"user",content:text+"\n\n[Context — "+modeLabel+"]\n"+ctx.join("\n\n")};

  try{
    var res=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM,messages:messages})});
    var data=await res.json();hideTyping();
    if(data.error){addAiMsg("Error: "+data.error.message);}
    else{
      var raw=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n").trim();

      // Handle task list parsing
      var taskMatch=raw.match(/<tasks>([\s\S]*?)<\/tasks>/);
      if(taskMatch){try{addTasksFromJSON(JSON.parse(taskMatch[1].trim()));}catch(e){}}

      // Handle task commands
      var cmdMatch=raw.match(/<task_command>([\s\S]*?)<\/task_command>/);
      var cmdResponse="";
      if(cmdMatch){try{cmdResponse=executeTaskCommand(JSON.parse(cmdMatch[1].trim()));}catch(e){}}

      var display=raw.replace(/<tasks>[\s\S]*?<\/tasks>/g,"").replace(/<task_command>[\s\S]*?<\/task_command>/g,"").trim();
      if(!display&&cmdResponse)display=cmdResponse;
      if(display){
        addAiMsg(display);
        H().push({role:"assistant",content:raw,display:display});
      }
    }
  }catch(e){hideTyping();addAiMsg("Couldn't reach the API: "+e.message);}
  isBusy=false;
}

async function getGmailText(token,label){
  try{
    var r=await fetch("https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=6&q=is:unread -category:promotions",{headers:{Authorization:"Bearer "+token}});
    var d=await r.json();if(!d.messages||!d.messages.length)return label+" Gmail: no unread.";
    var items=await Promise.all(d.messages.slice(0,5).map(async function(m){
      var mr=await fetch("https://www.googleapis.com/gmail/v1/users/me/messages/"+m.id+"?format=metadata&metadataHeaders=From&metadataHeaders=Subject",{headers:{Authorization:"Bearer "+token}});
      var md=await mr.json();var h={};((md.payload&&md.payload.headers)||[]).forEach(function(x){h[x.name]=x.value;});
      return"  - "+(h.Subject||"(no subject)")+" from "+cleanFrom(h.From||"?");
    }));
    return label+" unread:\n"+items.join("\n");
  }catch(e){return label+": error.";}
}

async function getCalText(token,label){
  try{
    var now=new Date().toISOString(),end=new Date(Date.now()+7*86400000).toISOString();
    var r=await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin="+encodeURIComponent(now)+"&timeMax="+encodeURIComponent(end)+"&maxResults=10&singleEvents=true&orderBy=startTime",{headers:{Authorization:"Bearer "+token}});
    var d=await r.json();if(!d.items||!d.items.length)return label+" calendar: nothing this week.";
    return label+" calendar:\n"+d.items.map(function(e){
      var s=(e.start&&(e.start.dateTime||e.start.date))||"";
      var ds=s?new Date(s).toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"All day";
      return"  - "+ds+": "+(e.summary||"(no title)");
    }).join("\n");
  }catch(e){return label+": error.";}
}
